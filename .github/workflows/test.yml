name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  pytest:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v7"
      - uses: "actions/setup-python@v6"
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements_test.txt
      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=custom_components.fraimic --cov-report=term-missing --cov-fail-under=95
