# Field/selector structure only. Localized name/description come from
# strings.json / translations/*.json ("services" key) and take
# precedence over the text below, which only serves as an English
# fallback if translations fail to load.
send_image:
  name: Send image
  description: >-
    Converts a local image file to the Spectra 6 .bin format and sends
    it to the Fraimic frame. Handy from automations/scripts.
  target:
    entity:
      domain: media_player
      integration: fraimic
  fields:
    path:
      name: Path
      description: >-
        Full path to the image file (jpg/png/etc.), e.g.
        /config/www/fraimic/photo.jpg. Must be within an allowed
        directory (allowlist_external_dirs or /config/www).
      required: true
      example: "/config/www/fraimic/vacation_photo.jpg"
      selector:
        text:
    fit:
      name: Fit
      description: >-
        How to fit the image into the 1200x1600 frame: fit (show the
        whole image, pad with black -- CSS object-fit: contain) or fill
        (fill the frame, cropping overflow -- CSS object-fit: cover).
      required: false
      default: fill
      selector:
        select:
          options:
            - fit
            - fill
    dither:
      name: Dithering
      description: >-
        Dithering algorithm for reducing the image to 6 colors, via the
        epaper-dithering library (falls back to floyd_steinberg for
        ordered/burkes/stucki/sierra/sierra_lite/jarvis_judice_ninke if
        that library isn't available): none (hard edges, banding),
        floyd_steinberg (most common, good default), atkinson (matches
        the original Fraimic conversion tool), ordered (fast, visible
        pattern), burkes, stucki (wide error distribution), sierra,
        sierra_lite (fast, simple), jarvis_judice_ninke (smooth
        gradients, slowest).
      required: false
      default: atkinson
      selector:
        select:
          options:
            - none
            - floyd_steinberg
            - atkinson
            - ordered
            - burkes
            - stucki
            - sierra
            - sierra_lite
            - jarvis_judice_ninke
    dry_run:
      name: Dry run
      description: >-
        Converts the image and updates the Display entity's picture like
        normal, but skips actually uploading it to the frame. Handy for
        previewing fit/dither/device_orientation results without waiting
        through the frame's 20-30s refresh cycle each time.
      required: false
      default: false
      selector:
        boolean:
