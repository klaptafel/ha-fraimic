# Field/selector structure only. Localized name/description come from
# strings.json / translations/*.json ("services" key) and take
# precedence over the text below, which only serves as an English
# fallback if translations fail to load.
send_image:
  name: Send image
  description: >-
    Sends a local image file to the frame, converting it to the
    Spectra 6 format first. Runs in the background and waits up to
    10 minutes for the frame to wake if it's asleep.
  target:
    entity:
      domain: media_player
      integration: fraimic
  fields:
    path:
      name: Path
      description: >-
        Path to the image file. Must be in an allowed directory
        (allowlist_external_dirs or /config/www).
      required: true
      example: "/config/www/fraimic/vacation_photo.jpg"
      selector:
        text:
    fit:
      name: Fit
      description: >-
        fit shows the whole image with black padding; fill crops
        to fill the frame.
      required: false
      default: fill
      selector:
        select:
          options:
            - fit
            - fill
    dither:
      name: Dithering
      description: >-
        Dithering algorithm for the 6-color conversion. atkinson matches
        the original Fraimic tool; floyd_steinberg is a fast, common
        default. Use dry run to preview a mode first.
      required: false
      default: atkinson
      selector:
        select:
          options:
            - none
            - floyd_steinberg
            - atkinson
            - ordered
            - burkes
            - stucki
            - sierra
            - sierra_lite
            - jarvis_judice_ninke
    dry_run:
      name: Dry run
      description: >-
        Converts and previews the image without uploading it to the frame.
      required: false
      default: false
      selector:
        boolean:

update_album:
  name: Update album
  description: >-
    Updates an existing album (find its ID via the Albums sensor's
    attributes). Only the fields you set are changed. Requires the frame
    to have internet access, since albums live on app.fraimic.com, not
    the frame itself.
  fields:
    entity_id:
      name: Albums sensor
      description: The Fraimic Albums sensor entity.
      required: true
      selector:
        entity:
          filter:
            integration: fraimic
            domain: sensor
    album_id:
      name: Album ID
      description: The album's id, from the Albums sensor's attributes.
      required: true
      selector:
        text:
    name:
      name: Name
      description: New name for the album.
      required: false
      selector:
        text:
    description:
      name: Description
      description: New description for the album.
      required: false
      selector:
        text:
    active:
      name: Slideshow Mode
      description: Automatically rotate images.
      required: false
      selector:
        boolean:
    playback_mode:
      name: Playback Mode
      description: Choose how images cycle through the album.
      required: false
      selector:
        select:
          options:
            - sequential
            - random
    schedule_type:
      name: Image Rotation Schedule
      description: >-
        How often should images change? Replaces the album's entire
        schedule -- always send the matching fields below for whichever
        type you choose.
      required: false
      selector:
        select:
          options:
            - value: interval
              label: Every X Time
            - value: specific_days
              label: Specific Days
    interval_value:
      name: Interval value
      description: "Used with Image Rotation Schedule: Every X Time, e.g. 24."
      required: false
      selector:
        number:
          min: 1
          mode: box
    interval_unit:
      name: Interval unit
      description: "Used with Image Rotation Schedule: Every X Time."
      required: false
      selector:
        select:
          options:
            - minutes
            - hours
            - days
    days:
      name: Select Days
      description: "Used with Image Rotation Schedule: Specific Days."
      required: false
      selector:
        select:
          multiple: true
          options:
            - monday
            - tuesday
            - wednesday
            - thursday
            - friday
            - saturday
            - sunday
